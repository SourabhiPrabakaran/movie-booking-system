apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-booking
  template:
    metadata:
      labels:
        app: movie-booking
    spec:
      containers:
      - name: movie-booking
        image: sourabhip/movie-booking:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: movie-booking-service
spec:
  type: NodePort
  selector:
    app: movie-booking
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007